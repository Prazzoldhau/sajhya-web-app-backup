{% extends 'base.html' %}
{% load static %}

{% block title %}Clinic Login - Sajhya Healthcare{% endblock %}



{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-sign-in-alt fa-2x mb-2"></i>
                <h3>Welcome Back!</h3>
                <p>Clinic Login to your Sajhya account</p>
            </div>
            <div class="auth-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" name="username" id="username" class="form-control" required autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                        <div class="password-wrapper">
                            <input type="password" name="password" id="password" class="form-control" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility(this)"></i>
                        </div>
                    </div>
                    
                    <div class="mb-3 text-end">
                        <a href="{% url 'password_reset_page' %}" class="btn-link-custom">Forgot Password?</a>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn-gradient">
                            Login <i class="fas fa-sign-in-alt"></i>
                        </button>
                    </div>
                </form>
            </div>
            <div class="auth-footer">
                <p class="mb-0">Don't have an account? 
                    <a href="{% url 'package_page'%}" class="btn-link-custom">Sign up here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
