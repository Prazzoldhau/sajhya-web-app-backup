{% extends 'base.html' %}
{% load static %}

{% block title %}Set New Password - Sajhya Healthcare{% endblock %}



{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock fa-2x mb-2"></i>
                <h3>Set New Password</h3>
                <p>Create a strong password for your account</p>
            </div>
            <div class="auth-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="new_password1" class="form-label">New Password <span class="text-danger">*</span></label>
                        <div class="password-wrapper">
                            <input type="password" name="new_password1" id="new_password1" class="form-control" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility(this)"></i>
                        </div>
                        <small class="form-text">Minimum 8 characters with letters and numbers</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="new_password2" class="form-label">Confirm Password <span class="text-danger">*</span></label>
                        <div class="password-wrapper">
                            <input type="password" name="new_password2" id="new_password2" class="form-control" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility(this)"></i>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn-gradient">
                            Reset Password <i class="fas fa-check-circle"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
